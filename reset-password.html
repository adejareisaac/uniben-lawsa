<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set New Password – LAWSA Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Archivo', sans-serif; background: #F4F7FC; display: flex; justify-content: center; align-items: center; height: 100vh; }
        form { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 0.75rem; background: #C39F33; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .error { color: red; margin-top: 0.5rem; }
        .success { color: green; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <form id="resetForm">
        <h2>Set New Password</h2>
        <input type="password" id="password" placeholder="New password" required minlength="6">
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
        <button type="submit">Update Password</button>
        <p class="error" id="error"></p>
        <p class="success" id="success"></p>
    </form>

    <script>
        const supabase = window.supabase.createClient(
            'https://zexamxpnccxsrxlcgosh.supabase.co',
            'sb_publishable_6GeUzm1SYyFgvaWBOJGKeA_MmZMtSJl'
        );

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                document.getElementById('error').textContent = 'Passwords do not match.';
                return;
            }

            const { data, error } = await supabase.auth.updateUser({ password });
            if (error) {
                document.getElementById('error').textContent = error.message;
            } else {
                document.getElementById('success').textContent = 'Password updated! Redirecting to login...';
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            }
        });
    </script>
</body>
</html>
